<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1f"/>
      <stop offset="100%" style="stop-color:#161630"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e38"/>
      <stop offset="100%" style="stop-color:#252548"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C3AE0"/>
      <stop offset="100%" style="stop-color:#9B6BFF"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00E5A0"/>
      <stop offset="100%" style="stop-color:#00C9FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1920" fill="url(#bg)"/>

  <!-- Decorative elements -->
  <circle cx="950" cy="150" r="250" fill="#6C3AE0" opacity="0.05"/>
  <circle cx="100" cy="1700" r="200" fill="#00C9FF" opacity="0.04"/>

  <!-- TOP SECTION -->
  <!-- Emoji icon large -->
  <text x="540" y="200" text-anchor="middle" font-size="80">📱</text>

  <!-- Title -->
  <text x="540" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="68" font-weight="bold" fill="#ffffff" letter-spacing="-2">Todo Budget</text>

  <!-- Subtitle -->
  <text x="540" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="30" fill="#8888aa">Всё для продуктивности в одном месте</text>

  <!-- Version pill -->
  <g transform="translate(540, 420)">
    <rect x="-55" y="-20" width="110" height="40" rx="20" fill="#6C3AE0" opacity="0.25" stroke="#6C3AE0" stroke-width="1" stroke-opacity="0.4"/>
    <text x="0" y="6" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#B8A0FF">v3.0</text>
  </g>

  <!-- FEATURE CARDS -->

  <!-- Card 1: Tasks -->
  <g transform="translate(60, 500)" filter="url(#cardShadow)">
    <rect width="960" height="180" rx="28" fill="url(#card)" stroke="#333355" stroke-width="1"/>
    <rect x="40" y="40" width="70" height="70" rx="20" fill="#6C3AE0" opacity="0.2"/>
    <text x="75" y="90" text-anchor="middle" font-size="36">✅</text>
    <text x="140" y="72" font-family="system-ui, sans-serif" font-size="30" font-weight="bold" fill="#ffffff">Умные задачи</text>
    <text x="140" y="110" font-family="system-ui, sans-serif" font-size="20" fill="#8888aa">Приоритеты · Подзадачи · Свайпы</text>
    <text x="140" y="140" font-family="system-ui, sans-serif" font-size="20" fill="#8888aa">Повторяющиеся · Напоминания</text>
  </g>

  <!-- Card 2: Budget -->
  <g transform="translate(60, 710)" filter="url(#cardShadow)">
    <rect width="960" height="180" rx="28" fill="url(#card)" stroke="#333355" stroke-width="1"/>
    <rect x="40" y="40" width="70" height="70" rx="20" fill="#00E5A0" opacity="0.15"/>
    <text x="75" y="90" text-anchor="middle" font-size="36">💰</text>
    <text x="140" y="72" font-family="system-ui, sans-serif" font-size="30" font-weight="bold" fill="#ffffff">Учёт финансов</text>
    <text x="140" y="110" font-family="system-ui, sans-serif" font-size="20" fill="#8888aa">Расходы/Доходы · Лимиты · Долги</text>
    <text x="140" y="140" font-family="system-ui, sans-serif" font-size="20" fill="#8888aa">Графики · Виджет баланса</text>
  </g>

  <!-- Card 3: Pomodoro -->
  <g transform="translate(60, 920)" filter="url(#cardShadow)">
    <rect width="960" height="180" rx="28" fill="url(#card)" stroke="#333355" stroke-width="1"/>
    <rect x="40" y="40" width="70" height="70" rx="20" fill="#FF6B6B" opacity="0.15"/>
    <text x="75" y="90" text-anchor="middle" font-size="36">⏱</text>
    <text x="140" y="72" font-family="system-ui, sans-serif" font-size="30" font-weight="bold" fill="#ffffff">Помодоро-таймер</text>
    <text x="140" y="110" font-family="system-ui, sans-serif" font-size="20" fill="#8888aa">Фокус 25 мин · Перерыв 5 мин</text>
    <text x="140" y="140" font-family="system-ui, sans-serif" font-size="20" fill="#8888aa">Статистика сессий</text>
  </g>

  <!-- Card 4: Notes -->
  <g transform="translate(60, 1130)" filter="url(#cardShadow)">
    <rect width="960" height="180" rx="28" fill="url(#card)" stroke="#333355" stroke-width="1"/>
    <rect x="40" y="40" width="70" height="70" rx="20" fill="#00C9FF" opacity="0.15"/>
    <text x="75" y="90" text-anchor="middle" font-size="36">📝</text>
    <text x="140" y="72" font-family="system-ui, sans-serif" font-size="30" font-weight="bold" fill="#ffffff">Быстрые заметки</text>
    <text x="140" y="110" font-family="system-ui, sans-serif" font-size="20" fill="#8888aa">Текстовый ввод · Голосовой ввод</text>
    <text x="140" y="140" font-family="system-ui, sans-serif" font-size="20" fill="#8888aa">Мгновенное сохранение</text>
  </g>

  <!-- STATS ROW -->
  <g transform="translate(60, 1380)">
    <rect width="280" height="120" rx="22" fill="#1a1a30" stroke="#2a2a44" stroke-width="1"/>
    <text x="140" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="40" font-weight="bold" fill="#00E5A0">9 МБ</text>
    <text x="140" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#666688">Размер</text>
  </g>

  <g transform="translate(400, 1380)">
    <rect width="280" height="120" rx="22" fill="#1a1a30" stroke="#2a2a44" stroke-width="1"/>
    <text x="140" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="40" font-weight="bold" fill="#00C9FF">0 ₽</text>
    <text x="140" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#666688">Навсегда</text>
  </g>

  <g transform="translate(740, 1380)">
    <rect width="280" height="120" rx="22" fill="#1a1a30" stroke="#2a2a44" stroke-width="1"/>
    <text x="140" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="40" font-weight="bold" fill="#FF6B6B">100%</text>
    <text x="140" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#666688">Оффлайн</text>
  </g>

  <!-- BOTTOM: CTA -->
  <g transform="translate(540, 1610)">
    <rect x="-240" y="-20" width="480" height="4" rx="2" fill="url(#green)" opacity="0.3"/>
  </g>

  <text x="540" y="1680" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" fill="#999">Без подписок. Без in-app покупок.</text>
  <text x="540" y="1720" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" fill="#999">Данные только на вашем устройстве.</text>

  <!-- Download button -->
  <g transform="translate(540, 1810)">
    <rect x="-200" y="-36" width="400" height="72" rx="36" fill="url(#purple)" filter="url(#glow)"/>
    <text x="0" y="10" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="bold" fill="#ffffff">📲 Скачать бесплатно</text>
  </g>

  <!-- Link hint -->
  <text x="540" y="1900" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#444466">RuStore · APK · Сайт</text>
</svg>