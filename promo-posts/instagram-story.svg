<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="40%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C3AE0"/>
      <stop offset="100%" style="stop-color:#9B6BFF"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5A0"/>
      <stop offset="100%" style="stop-color:#00C9FF"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="100%" style="stop-color:#FFB347"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C9FF"/>
      <stop offset="100%" style="stop-color:#6C3AE0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1920" fill="url(#bg)"/>

  <!-- Decorative blobs -->
  <circle cx="900" cy="200" r="300" fill="#6C3AE0" opacity="0.06"/>
  <circle cx="100" cy="1600" r="250" fill="#00C9FF" opacity="0.05"/>
  <circle cx="800" cy="1400" r="200" fill="#00E5A0" opacity="0.04"/>
  <circle cx="200" cy="600" r="180" fill="#FF6B6B" opacity="0.03"/>

  <!-- Subtle grid -->
  <g opacity="0.02" stroke="#fff" stroke-width="1">
    <line x1="0" y1="240" x2="1080" y2="240"/>
    <line x1="0" y1="480" x2="1080" y2="480"/>
    <line x1="0" y1="720" x2="1080" y2="720"/>
    <line x1="0" y1="960" x2="1080" y2="960"/>
    <line x1="0" y1="1200" x2="1080" y2="1200"/>
    <line x1="0" y1="1440" x2="1080" y2="1440"/>
    <line x1="0" y1="1680" x2="1080" y2="1680"/>
    <line x1="270" y1="0" x2="270" y2="1920"/>
    <line x1="540" y1="0" x2="540" y2="1920"/>
    <line x1="810" y1="0" x2="810" y2="1920"/>
  </g>

  <!-- TOP: "FREE" badge -->
  <g transform="translate(540, 120)">
    <rect x="-100" y="-28" width="200" height="56" rx="28" fill="#00E5A0" opacity="0.15" stroke="#00E5A0" stroke-width="1.5" stroke-opacity="0.4"/>
    <text x="0" y="8" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#00E5A0" letter-spacing="4">БЕСПЛАТНО</text>
  </g>

  <!-- App name -->
  <text x="540" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="bold" fill="#ffffff" letter-spacing="-2">Todo Budget</text>

  <!-- Tagline -->
  <text x="540" y="320" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#8888aa">4 приложения в одном. 9 МБ.</text>

  <!-- PHONE MOCKUP -->
  <g transform="translate(190, 400)" filter="url(#shadow)">
    <!-- Phone frame -->
    <rect x="0" y="0" width="700" height="1020" rx="60" fill="#1e1e30" stroke="#333355" stroke-width="3"/>
    <!-- Screen -->
    <rect x="20" y="20" width="660" height="980" rx="48" fill="#121220"/>

    <!-- Status bar -->
    <rect x="20" y="20" width="660" height="60" rx="48" fill="#1a1a2e"/>
    <text x="55" y="58" font-family="monospace" font-size="20" fill="#666">9:41</text>
    <text x="610" y="58" font-family="monospace" font-size="20" fill="#666">100%</text>

    <!-- Notch -->
    <rect x="250" y="20" width="200" height="32" rx="16" fill="#0a0a1a"/>

    <!-- App header -->
    <rect x="20" y="80" width="660" height="80" fill="#1a1a2e"/>
    <text x="55" y="132" font-family="system-ui, sans-serif" font-size="34" font-weight="bold" fill="#fff">Todo Budget</text>

    <!-- Tabs -->
    <rect x="45" y="175" width="120" height="48" rx="24" fill="#6C3AE0"/>
    <text x="68" y="206" font-family="system-ui, sans-serif" font-size="20" fill="#fff">Задачи</text>

    <rect x="175" y="175" width="120" height="48" rx="24" fill="#2a2a40"/>
    <text x="193" y="206" font-family="system-ui, sans-serif" font-size="20" fill="#888">Бюджет</text>

    <rect x="305" y="175" width="110" height="48" rx="24" fill="#2a2a40"/>
    <text x="322" y="206" font-family="system-ui, sans-serif" font-size="20" fill="#888">Фокус</text>

    <rect x="425" y="175" width="130" height="48" rx="24" fill="#2a2a40"/>
    <text x="442" y="206" font-family="system-ui, sans-serif" font-size="20" fill="#888">Заметки</text>

    <!-- Task 1 -->
    <rect x="45" y="245" width="590" height="90" rx="18" fill="#222240"/>
    <circle cx="80" cy="290" r="16" fill="none" stroke="#FF6B6B" stroke-width="3"/>
    <text x="115" y="282" font-family="system-ui, sans-serif" font-size="22" fill="#e0e0e0">Купить продукты</text>
    <text x="115" y="308" font-family="system-ui, sans-serif" font-size="16" fill="#666">Сегодня, 18:00 · Высокий</text>
    <rect x="560" y="278" width="50" height="8" rx="4" fill="#FF6B6B"/>

    <!-- Task 2 (done) -->
    <rect x="45" y="348" width="590" height="90" rx="18" fill="#222240" opacity="0.6"/>
    <circle cx="80" cy="393" r="16" fill="#00E5A0" opacity="0.3"/>
    <text x="68" y="400" font-family="system-ui, sans-serif" font-size="22" fill="#00E5A0">✓</text>
    <text x="115" y="385" font-family="system-ui, sans-serif" font-size="22" fill="#666" text-decoration="line-through">Оплатить счёт</text>
    <text x="115" y="411" font-family="system-ui, sans-serif" font-size="16" fill="#444">Выполнено</text>

    <!-- Task 3 -->
    <rect x="45" y="451" width="590" height="90" rx="18" fill="#222240"/>
    <circle cx="80" cy="496" r="16" fill="none" stroke="#FFB347" stroke-width="3"/>
    <text x="115" y="488" font-family="system-ui, sans-serif" font-size="22" fill="#e0e0e0">Подготовить отчёт</text>
    <text x="115" y="514" font-family="system-ui, sans-serif" font-size="16" fill="#666">Завтра, 10:00 · Средний</text>
    <rect x="560" y="484" width="50" height="8" rx="4" fill="#FFB347"/>

    <!-- Task 4 -->
    <rect x="45" y="554" width="590" height="90" rx="18" fill="#222240"/>
    <circle cx="80" cy="599" r="16" fill="none" stroke="#00C9FF" stroke-width="3"/>
    <text x="115" y="591" font-family="system-ui, sans-serif" font-size="22" fill="#e0e0e0">Позвонить маме</text>
    <text x="115" y="617" font-family="system-ui, sans-serif" font-size="16" fill="#666">Пт, 19:00 · Низкий</text>
    <rect x="560" y="587" width="50" height="8" rx="4" fill="#00C9FF"/>

    <!-- Task 5 -->
    <rect x="45" y="657" width="590" height="90" rx="18" fill="#222240"/>
    <circle cx="80" cy="702" r="16" fill="none" stroke="#6C3AE0" stroke-width="3"/>
    <text x="115" y="694" font-family="system-ui, sans-serif" font-size="22" fill="#e0e0e0">Пробежка в парке</text>
    <text x="115" y="720" font-family="system-ui, sans-serif" font-size="16" fill="#666">Сб, 08:00 · Средний</text>
    <rect x="560" y="690" width="50" height="8" rx="4" fill="#6C3AE0"/>

    <!-- Balance widget -->
    <rect x="45" y="770" width="590" height="100" rx="18" fill="url(#blue)" opacity="0.12" stroke="url(#blue)" stroke-width="1.5" stroke-opacity="0.25"/>
    <text x="70" y="810" font-family="system-ui, sans-serif" font-size="18" fill="#8888aa">Баланс</text>
    <text x="70" y="850" font-family="system-ui, sans-serif" font-size="36" font-weight="bold" fill="#00E5A0">₽42 350</text>
    <text x="280" y="850" font-family="system-ui, sans-serif" font-size="18" fill="#00E5A0">↑ +12%</text>
    <text x="520" y="810" font-family="system-ui, sans-serif" font-size="14" fill="#666">Доходы</text>
    <text x="520" y="832" font-family="system-ui, sans-serif" font-size="18" fill="#00E5A0">₽65 000</text>
    <text x="520" y="858" font-family="system-ui, sans-serif" font-size="14" fill="#666">Расходы</text>
    <text x="520" y="878" font-family="system-ui, sans-serif" font-size="18" fill="#FF6B6B">₽22 650</text>

    <!-- Mini chart bars -->
    <g transform="translate(45, 888)">
      <rect x="0" y="0" width="590" height="80" rx="18" fill="#222240"/>
      <rect x="30" y="55" width="40" height="15" rx="4" fill="#00E5A0" opacity="0.6"/>
      <rect x="85" y="40" width="40" height="30" rx="4" fill="#00E5A0" opacity="0.6"/>
      <rect x="140" y="25" width="40" height="45" rx="4" fill="#00E5A0" opacity="0.7"/>
      <rect x="195" y="35" width="40" height="35" rx="4" fill="#00E5A0" opacity="0.6"/>
      <rect x="250" y="15" width="40" height="55" rx="4" fill="#00E5A0" opacity="0.8"/>
      <rect x="305" y="30" width="40" height="40" rx="4" fill="#00E5A0" opacity="0.7"/>
      <rect x="360" y="10" width="40" height="60" rx="4" fill="#00E5A0"/>
      <text x="450" y="48" font-family="system-ui, sans-serif" font-size="14" fill="#666">Доходы за неделю</text>
    </g>

    <!-- FAB -->
    <circle cx="600" cy="760" r="36" fill="#6C3AE0" filter="url(#glow)"/>
    <text x="588" y="771" font-family="system-ui, sans-serif" font-size="38" fill="#fff">+</text>
  </g>

  <!-- BOTTOM: Feature icons -->
  <g transform="translate(0, 1480)">
    <!-- Feature row -->
    <g transform="translate(120, 0)">
      <rect x="-50" y="-50" width="100" height="100" rx="24" fill="#6C3AE0" opacity="0.2"/>
      <text x="0" y="12" text-anchor="middle" font-family="system-ui, sans-serif" font-size="42">✅</text>
      <text x="0" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" fill="#B8A0FF">Задачи</text>
    </g>

    <g transform="translate(360, 0)">
      <rect x="-50" y="-50" width="100" height="100" rx="24" fill="#00E5A0" opacity="0.15"/>
      <text x="0" y="12" text-anchor="middle" font-family="system-ui, sans-serif" font-size="42">💰</text>
      <text x="0" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" fill="#00E5A0">Бюджет</text>
    </g>

    <g transform="translate(600, 0)">
      <rect x="-50" y="-50" width="100" height="100" rx="24" fill="#FF6B6B" opacity="0.15"/>
      <text x="0" y="12" text-anchor="middle" font-family="system-ui, sans-serif" font-size="42">⏱</text>
      <text x="0" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" fill="#FF8A8A">Помодоро</text>
    </g>

    <g transform="translate(840, 0)">
      <rect x="-50" y="-50" width="100" height="100" rx="24" fill="#00C9FF" opacity="0.15"/>
      <text x="0" y="12" text-anchor="middle" font-family="system-ui, sans-serif" font-size="42">📝</text>
      <text x="0" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" fill="#00C9FF">Заметки</text>
    </g>
  </g>

  <!-- Key stats -->
  <text x="540" y="1660" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" fill="#555577">
    <tspan fill="#00E5A0" font-weight="bold">9 МБ</tspan>
    <tspan fill="#333355">  ·  </tspan>
    <tspan fill="#00C9FF" font-weight="bold">Оффлайн</tspan>
    <tspan fill="#333355">  ·  </tspan>
    <tspan fill="#FF6B6B" font-weight="bold">0 подписок</tspan>
  </text>

  <!-- CTA -->
  <g transform="translate(540, 1760)">
    <rect x="-220" y="-38" width="440" height="76" rx="38" fill="url(#purple)" filter="url(#glow)"/>
    <text x="0" y="10" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="bold" fill="#ffffff">Скачать в RuStore ↗</text>
  </g>

  <!-- Swipe up hint -->
  <text x="540" y="1880" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#444466">Ссылка в описании профиля</text>
</svg>