<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C3AE0"/>
      <stop offset="100%" style="stop-color:#9B6BFF"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00E5A0"/>
      <stop offset="100%" style="stop-color:#00C9FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1080" height="1920" fill="url(#bg)"/>

  <!-- Big decorative circles -->
  <circle cx="540" cy="960" r="500" fill="#6C3AE0" opacity="0.04"/>
  <circle cx="540" cy="960" r="350" fill="#6C3AE0" opacity="0.04"/>

  <!-- App name big -->
  <text x="540" y="620" text-anchor="middle" font-family="system-ui, sans-serif" font-size="90" font-weight="bold" fill="#ffffff" letter-spacing="-3" filter="url(#glow)">Todo Budget</text>

  <!-- Tagline -->
  <text x="540" y="720" text-anchor="middle" font-family="system-ui, sans-serif" font-size="36" fill="#8888aa">Задачи · Бюджет · Помодоро · Заметки</text>

  <!-- Big FREE text -->
  <text x="540" y="920" text-anchor="middle" font-family="system-ui, sans-serif" font-size="120" font-weight="bold" fill="#00E5A0" opacity="0.9" filter="url(#glow)">БЕСПЛАТНО</text>

  <text x="540" y="1000" text-anchor="middle" font-family="system-ui, sans-serif" font-size="32" fill="#555577">Навсегда. Без подписок.</text>

  <!-- CTA button -->
  <g transform="translate(540, 1200)">
    <rect x="-260" y="-46" width="520" height="92" rx="46" fill="url(#purple)" filter="url(#glow)"/>
    <text x="0" y="14" text-anchor="middle" font-family="system-ui, sans-serif" font-size="36" font-weight="bold" fill="#fff">📲 Скачать в RuStore</text>
  </g>

  <!-- Or -->
  <text x="540" y="1350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" fill="#444466">или</text>

  <!-- Website link -->
  <g transform="translate(540, 1420)">
    <rect x="-260" y="-40" width="520" height="80" rx="40" fill="#1e1e38" stroke="#333355" stroke-width="2"/>
    <text x="0" y="10" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" fill="#00C9FF">🌐 emil-a-dev.github.io/todofin</text>
  </g>

  <!-- Bottom hint -->
  <text x="540" y="1650" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" fill="#555577">Ссылка в описании профиля ↓</text>

  <!-- Feature mini icons -->
  <g transform="translate(540, 1800)">
    <text x="-240" y="0" text-anchor="middle" font-size="40">✅</text>
    <text x="-80" y="0" text-anchor="middle" font-size="40">💰</text>
    <text x="80" y="0" text-anchor="middle" font-size="40">⏱</text>
    <text x="240" y="0" text-anchor="middle" font-size="40">📝</text>
  </g>
</svg>